<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7天主体性练习</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #1A1A1A;
    --gray: #888888;
    --light-gray: #E5E5E5;
    --bg: #FAFAFA;
    --accent: #69DB7C;
    --amber: #F59E0B;
  }
  body {
    font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', 'STSong', 'Songti SC', serif;
    background: var(--bg);
    color: var(--ink);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    opacity: 0;
    animation: pageFadeIn 0.4s ease forwards;
  }
  @keyframes pageFadeIn {
    to { opacity: 1; }
  }
  body.page-fade-out {
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  /* 进度条 */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: var(--light-gray);
    z-index: 100;
  }
  .progress-fill {
    height: 100%;
    background: var(--ink);
    transition: width 0.8s ease;
    width: 0%;
  }

  /* 顶部导航 */
  .nav-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    z-index: 90;
    background: var(--bg);
  }
  .nav-left {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .nav-back {
    font-size: 0.8rem;
    color: var(--gray);
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: color 0.3s;
  }
  .nav-back:hover { color: var(--ink); }
  .nav-link {
    font-size: 0.75rem;
    color: var(--gray);
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: color 0.3s;
    border-bottom: 1px solid transparent;
  }
  .nav-link:hover {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }
  .nav-title {
    font-size: 0.75rem;
    color: var(--gray);
    letter-spacing: 0.15em;
  }
  .nav-day {
    font-size: 0.75rem;
    color: var(--gray);
    letter-spacing: 0.1em;
  }

  /* 底部导航 */
  .day-nav {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    z-index: 90;
  }
  .day-nav-btn {
    padding: 0.6rem 1.5rem;
    background: transparent;
    border: 1px solid var(--light-gray);
    color: var(--gray);
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.4s ease;
  }
  .day-nav-btn:hover:not(:disabled) {
    border-color: var(--ink);
    color: var(--ink);
  }
  .day-nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .day-nav-current {
    font-size: 0.75rem;
    color: var(--gray);
    letter-spacing: 0.15em;
    min-width: 80px;
    text-align: center;
  }
  .day-nav-link {
    font-size: 0.7rem;
    color: var(--gray);
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: color 0.3s;
    border-bottom: 1px solid transparent;
    margin-left: 1rem;
  }
  .day-nav-link:hover {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }

  /* 练习容器 */
  .practice-container {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 4rem 3rem 3rem;
    position: absolute;
    top: 0; left: 0;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
    pointer-events: none;
  }
  .practice-container.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }
  .practice-container.leave {
    opacity: 0;
    transform: translateY(-30px);
    pointer-events: none;
  }

  .day-badge {
    font-size: 0.7rem;
    color: var(--gray);
    letter-spacing: 0.2em;
    margin-bottom: 1.5rem;
    padding: 0.4rem 1.2rem;
    border: 1px solid var(--light-gray);
  }
  .day-title {
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
    text-align: center;
  }
  .day-subtitle {
    font-size: clamp(0.8rem, 1.2vw, 0.95rem);
    color: var(--gray);
    letter-spacing: 0.1em;
    margin-bottom: 2.5rem;
    text-align: center;
  }
  .day-task {
    font-size: 0.9rem;
    line-height: 2;
    color: var(--ink);
    text-align: center;
    max-width: 520px;
    margin-bottom: 2rem;
    letter-spacing: 0.03em;
  }

  /* 交互区域 */
  .interaction-area {
    width: 100%;
    max-width: 500px;
  }
  .text-input {
    width: 100%;
    padding: 1.5rem;
    border: 1px solid var(--light-gray);
    background: #FFFFFF;
    font-family: inherit;
    font-size: 1rem;
    line-height: 1.8;
    color: var(--ink);
    resize: none;
    outline: none;
    transition: border-color 0.3s ease;
    min-height: 120px;
  }
  .text-input:focus { border-color: var(--ink); }

  /* 焦虑指数滑块 */
  .anxiety-slider {
    width: 100%;
    max-width: 400px;
    margin: 0 auto 2rem;
  }
  .anxiety-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1rem;
    font-size: 0.75rem;
    color: var(--gray);
  }
  .anxiety-track {
    width: 100%;
    height: 2px;
    background: var(--light-gray);
    position: relative;
    cursor: pointer;
  }
  .anxiety-fill {
    height: 100%;
    background: var(--ink);
    width: 0%;
    transition: width 0.1s ease;
  }
  .anxiety-thumb {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--ink);
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    left: 0%;
    cursor: grab;
  }
  .anxiety-value {
    text-align: center;
    margin-top: 1rem;
    font-size: 2rem;
    font-weight: 900;
    color: var(--ink);
  }

  /* 倒计时 */
  .countdown-display {
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 900;
    letter-spacing: 0.05em;
    text-align: center;
    margin-bottom: 2rem;
    font-variant-numeric: tabular-nums;
  }
  .countdown-hint {
    font-size: 0.8rem;
    color: var(--gray);
    text-align: center;
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
  }

  /* 下一步按钮 */
  .next-btn {
    margin-top: 2rem;
    padding: 0.9rem 3rem;
    background: var(--ink);
    color: #FFFFFF;
    border: none;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.4s ease;
    font-family: inherit;
    opacity: 0;
    pointer-events: none;
  }
  .next-btn.show {
    opacity: 1;
    pointer-events: all;
  }
  .next-btn:hover { background: #333333; }

  /* 终极彩蛋 */
  .badge-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .badge-overlay.show {
    display: flex;
    opacity: 1;
  }
  .badge-svg {
    width: 200px;
    height: 200px;
    margin-bottom: 2rem;
  }
  .badge-title {
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }
  .badge-desc {
    font-size: 0.9rem;
    color: var(--gray);
    line-height: 2;
    text-align: center;
    max-width: 480px;
    letter-spacing: 0.05em;
  }
  .badge-nav {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-top: 2.5rem;
  }
  .badge-nav-btn {
    padding: 0.6rem 1.5rem;
    background: transparent;
    border: 1px solid var(--light-gray);
    color: var(--gray);
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.4s ease;
  }
  .badge-nav-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  /* ===== AI建议卡片 ===== */
  .ai-suggestion-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(250,250,250,0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 3rem;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .ai-suggestion-overlay.show {
    display: flex;
    opacity: 1;
  }
  .ai-suggestion-card {
    width: 100%;
    max-width: 560px;
    background: #FFFFFF;
    border: 2px solid var(--ink);
    padding: 2.5rem;
    box-shadow: 8px 8px 0 rgba(26,26,26,0.08);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s ease 0.3s;
  }
  .ai-suggestion-overlay.show .ai-suggestion-card {
    opacity: 1;
    transform: translateY(0);
  }
  .ai-suggestion-header {
    font-size: 0.75rem;
    color: var(--gray);
    letter-spacing: 0.2em;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }
  .ai-suggestion-body {
    font-size: 0.95rem;
    line-height: 1.9;
    color: #333;
    letter-spacing: 0.03em;
    margin-bottom: 2rem;
  }
  .ai-suggestion-body strong {
    color: var(--ink);
  }
  .ai-suggestion-body p {
    margin-bottom: 0.8rem;
  }
  .ai-suggestion-section {
    margin-bottom: 1.8rem;
  }
  .ai-suggestion-section:last-of-type {
    margin-bottom: 0;
  }
  .ai-section-title {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--ink);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .ai-section-emoji {
    font-size: 1.1rem;
  }
  .ai-section-highlight {
    background: #F8F8F8;
    padding: 1rem 1.2rem;
    border-left: 3px solid var(--ink);
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }
  .ai-section-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .ai-section-list li {
    padding: 0.5rem 0;
    padding-left: 1.2rem;
    position: relative;
    font-size: 0.9rem;
    line-height: 1.7;
    color: #444;
  }
  .ai-section-list li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--gray);
  }
  .ai-suggestion-divider {
    width: 40px;
    height: 2px;
    background: var(--light-gray);
    margin: 1.5rem auto;
  }
  .ai-suggestion-tip {
    font-size: 0.8rem;
    color: var(--gray);
    font-style: italic;
    text-align: center;
    line-height: 1.6;
  }
  .ai-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    margin: 2rem 0;
  }
  .ai-loading-dots {
    display: flex;
    gap: 0.4rem;
  }
  .ai-loading-dots span {
    width: 6px;
    height: 6px;
    background: var(--ink);
    border-radius: 50%;
    animation: aiBounce 1.4s ease-in-out infinite both;
  }
  .ai-loading-dots span:nth-child(1) { animation-delay: -0.32s; }
  .ai-loading-dots span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes aiBounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
  .ai-loading-text {
    font-size: 0.8rem;
    color: var(--gray);
    letter-spacing: 0.1em;
  }
  .ai-suggestion-btn {
    padding: 0.8rem 2.5rem;
    background: var(--ink);
    color: #FFFFFF;
    border: none;
    font-family: inherit;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.4s ease;
    margin-top: 0.5rem;
  }
  .ai-suggestion-btn:hover {
    background: #333333;
  }

  /* 完成页 */
  .complete-container {
    width: 100vw;
    height: 100vh;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 3rem;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .complete-container.show {
    display: flex;
    opacity: 1;
  }
</style>
</head>
<body>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="nav-bar">
  <div class="nav-left">
    <div class="nav-back" onclick="goBack()">&#8592; 返回</div>
    <div class="nav-link" onclick="goToQuiz()">查看测评</div>
  </div>
  <div class="nav-title" id="navTitle">在场专项练习</div>
  <div class="nav-day" id="navDay">Day 1 / 7</div>
</div>

<!-- 练习内容由JS动态生成 -->
<div id="practiceContent"></div>

<!-- 底部左右导航 -->
<div class="day-nav" id="dayNav">
  <button class="day-nav-btn" id="prevBtn" onclick="goPrev()">上一页</button>
  <div class="day-nav-current" id="navCurrent">Day 1 / 7</div>
  <button class="day-nav-btn" id="nextBtnNav" onclick="goNext()">下一天 &#8594;</button>
  <div class="day-nav-link" onclick="goToQuiz()">查看测评</div>
</div>

<!-- AI每日建议 -->
<div class="ai-suggestion-overlay" id="aiSuggestionOverlay">
  <div class="ai-suggestion-card">
    <div class="ai-suggestion-header" id="aiSuggestionHeader">AI 练习建议</div>
    <div class="ai-loading" id="aiSuggestionLoading">
      <div class="ai-loading-dots"><span></span><span></span><span></span></div>
      <div class="ai-loading-text">正在生成今日建议...</div>
    </div>
    <div class="ai-suggestion-body" id="aiSuggestionBody">
      <div class="ai-suggestion-section" id="aiSectionCore"></div>
      <div class="ai-suggestion-section" id="aiSectionAction"></div>
      <div class="ai-suggestion-section" id="aiSectionExtra"></div>
    </div>
    <div class="ai-suggestion-divider"></div>
    <div class="ai-suggestion-tip" id="aiSuggestionTip"></div>
  </div>
  <button class="ai-suggestion-btn" id="aiSuggestionBtn" onclick="closeAISuggestion()" style="display:none;">继续</button>
</div>

<!-- 终极彩蛋 -->
<div class="badge-overlay" id="badgeOverlay">
  <svg class="badge-svg" id="badgeSvg" viewBox="0 0 200 200">
    <!-- 徽章由JS动态绘制 -->
  </svg>
  <div class="badge-title" id="badgeTitle"></div>
  <div class="badge-desc" id="badgeDesc"></div>
  <div class="badge-nav">
    <button class="badge-nav-btn" onclick="goBack()">&#8592; 返回首页</button>
    <button class="badge-nav-btn" onclick="goToQuiz()">查看测评 &#8594;</button>
  </div>
</div>

<script>
// 页面跳转（带淡出效果）
function navigateTo(url) {
  document.body.classList.add('page-fade-out');
  setTimeout(() => {
    window.location.href = url;
  }, 300);
}

// 获取当前用户角色对应的测评页面
function getQuizPage() {
  const role = localStorage.getItem('userRole') || 'worker';
  return role + '.html';
}

// ===== AI 调用配置 =====
const AI_PROVIDERS = {
  siliconflow: {
    name: '硅基流动',
    baseUrl: 'https://api.siliconflow.cn/v1/chat/completions',
    model: 'deepseek-ai/DeepSeek-V3'
  },
  deepseek: {
    name: 'DeepSeek 官方',
    baseUrl: 'https://api.deepseek.com/chat/completions',
    model: 'deepseek-v4-flash'
  }
};

function getAIProvider() {
  return localStorage.getItem('ai_provider') || 'siliconflow';
}
function getAPIKey() {
  return localStorage.getItem('deepseek_api_key') || '';
}

// 确保始终有 API Key（预配置方便使用）
if (!localStorage.getItem('deepseek_api_key')) {
  localStorage.setItem('deepseek_api_key', 'sk-kyvwjsyrgdvbintjozqykhufomgjkceducpyzztzsrsxpcrn');
  localStorage.setItem('ai_provider', 'siliconflow');
}

// 角色对应的AI建议Prompt（深度思考协议）
const ROLE_ADVICE_PROMPTS = {
  worker: `# Role: 资深运营总监/战略顾问
# 深度思考协议：
1. 禁止套话：严禁出现"建议制定计划"、"保持积极心态"、"加强沟通"等万金油建议。
2. 基于证据：每一条建议必须直接引用用户在练习中提供的具体细节。
3. 反直觉：尝试给出一个用户可能没想到，但符合逻辑的切入点。
4. 诊断真伪：分析用户的问题，判断是"能力问题"还是"机制/资源问题"。
5. 寻找杠杆：不要让用户做加法（更努力），要找减法（砍掉什么）或乘法（谁能帮我）。`,
  student: `# Role: 认知心理学导师/学霸学长
# 深度思考协议：
1. 禁止套话：严禁出现"你要努力学习"、"不要焦虑"、"加油"等鸡汤式建议。
2. 基于证据：每一条建议必须直接引用用户在练习中提到的具体细节（如具体科目、具体时间、具体场景）。
3. 反直觉：尝试给出一个用户可能没想到，但符合逻辑的切入点。
4. 情绪剥离：先承认情绪，然后迅速把情绪转化为具体问题。
5. 极度拆解：把大目标拆解到"不可能失败"的程度。`,
  creator: `# Role: 创意总监/独立出版人
# 深度思考协议：
1. 禁止套话：严禁出现"多看书"、"多积累素材"、"坚持日更"等套路建议。
2. 基于证据：每一条建议必须直接引用用户在练习中提到的具体创作细节。
3. 反直觉：尝试给出一个用户可能没想到，但符合逻辑的切入点。
4. 挖掘痛点：从用户的困惑中找到共鸣点。
5. 完成大于完美：针对完美主义，给出"烂初稿"策略。`,
  leader: `# Role: 组织发展专家/高管教练
# 深度思考协议：
1. 禁止套话：严禁出现"多关心员工"、"多开会"、"以身作则"等说教式建议。
2. 基于证据：每一条建议必须直接引用用户在练习中提到的具体管理细节。
3. 反直觉：尝试给出一个用户可能没想到，但符合逻辑的切入点。
4. 归因分析：如果是人的问题，是意愿还是能力？如果是流程问题，是缺失还是冗余？
5. 授权艺术：不要建议"亲力亲为"，要建议"如何定标准"和"如何检查"。`
};

// 本地备用建议模板（API不可用时用，符合深度思考协议格式）
const LOCAL_SUGGESTIONS = {

async function callPracticeAI(systemPrompt, userMessage) {
  const apiKey = getAPIKey();

  // 如果有API Key，尝试调用
  if (apiKey) {
    const providers = [getAIProvider()];
    if (providers[0] !== 'siliconflow') providers.push('siliconflow');
    if (providers[0] !== 'deepseek') providers.push('deepseek');

    for (const providerKey of providers) {
      const config = AI_PROVIDERS[providerKey];
      for (let attempt = 0; attempt <= 1; attempt++) {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 12000);

          const response = await fetch(config.baseUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: config.model,
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: userMessage }
              ],
              stream: false,
              temperature: 0.7,
              max_tokens: 512
            }),
            signal: controller.signal
          });

          clearTimeout(timeoutId);

          if (!response.ok) {
            if (attempt < 1) { await new Promise(r => setTimeout(r, 1000)); continue; }
            break;
          }

          const data = await response.json();
          const content = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
          if (content) return content;
        } catch (e) {
          if (attempt < 1) { await new Promise(r => setTimeout(r, 1000)); continue; }
          break;
        }
      }
    }
  }

  // API不可用时生成本地建议
  const role = localStorage.getItem('userRole') || 'worker';
  const suggestions = LOCAL_SUGGESTIONS[role] || LOCAL_SUGGESTIONS.worker;
  // 根据天数取模选择不同建议
  const dayIndex = (userMessage.length % suggestions.length);
  return suggestions[dayIndex];
}

  const userMessage = `以下是我今天的练习回答：\n\n${userAnswer || '（用户完成了练习但未填写文字）'}`;

// 解析AI建议Markdown并渲染到分区
function renderAISuggestion(markdown, role) {
  const coreEl = document.getElementById('aiSectionCore');
  const actionEl = document.getElementById('aiSectionAction');
  const extraEl = document.getElementById('aiSectionExtra');

  // 通用解析器
  const lines = markdown.split('\n');
  const blocks = [];
  let currentBlock = null;

  lines.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;

    // 检测标题行
    const isHeading = trimmed.match(/^(##\s+|[\🔍\🛠️\💡\🎯\🔥\✍️\🧭]\s*\*\*[^*]+\*\*)/);
    const isListItem = trimmed.match(/^(\d+\.\s+|[\-\*]\s+)/);

    if (isHeading && !isListItem) {
      if (currentBlock) blocks.push(currentBlock);
      const emoji = trimmed.match(/^([\🔍\🛠️\💡\🎯\🔥\✍️\🧭])/) ? trimmed.match(/^([\🔍\🛠️\💡\🎯\🔥\✍️\🧭])/)[1] : '';
      const text = trimmed.replace(/^##\s+/, '').replace(/^[\🔍\🛠️\💡\🎯\🔥\✍️\🧭]\s*\*\*\s*/, '').replace(/\*\*\s*$/, '').replace(/^\*\*[^*]*\*\*\s*[:：]?\s*/, '');
      currentBlock = { emoji: emoji, title: text, items: [], body: '' };
    } else if (currentBlock && isListItem) {
      const content = trimmed.replace(/^\d+\.\s+/, '').replace(/^[\-\*]\s+/, '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      currentBlock.items.push(content);
    } else if (currentBlock) {
      const clean = trimmed.replace(/^\(.*?\)\s*/, '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      if (clean && !trimmed.startsWith('(')) {
        currentBlock.body += (currentBlock.body ? ' ' : '') + clean;
      }
    }
  });
  if (currentBlock) blocks.push(currentBlock);

  // 识别核心洞察块
  let coreBlock = blocks.find(b =>
    b.title.includes('洞察') || b.title.includes('松绑') ||
    b.title.includes('引爆') || b.title.includes('透视')
  );
  // 识别关键行动块
  let actionBlock = blocks.find(b =>
    b.title.includes('行动') || b.title.includes('启动') ||
    b.title.includes('突围') || b.title.includes('杠杆') ||
    b.title.includes('解法')
  );

  if (!coreBlock && blocks.length > 0) coreBlock = blocks[0];
  if (!actionBlock && blocks.length > 1) actionBlock = blocks[1];

  // 渲染核心洞察
  if (coreBlock) {
    const emoji = coreBlock.emoji || '🔍';
    coreEl.innerHTML = '<div class="ai-section-title"><span class="ai-section-emoji">' + emoji + '</span>' + coreBlock.title + '</div><div class="ai-section-highlight">' + (coreBlock.body || coreBlock.items.join(' / ') || '') + '</div>';
  } else {
    coreEl.innerHTML = '<div class="ai-section-title"><span class="ai-section-emoji">🔍</span>核心洞察</div><div class="ai-section-highlight">你今天的练习本身就是一次觉察，继续保持。</div>';
  }

  // 渲染关键行动
  if (actionBlock) {
    const emoji = actionBlock.emoji || '🛠️';
    const itemsHtml = actionBlock.items.length > 0
      ? '<ul class="ai-section-list">' + actionBlock.items.map(item => '<li>' + item + '</li>').join('') + '</ul>'
      : '<div class="ai-section-highlight">' + (actionBlock.body || '') + '</div>';
    actionEl.innerHTML = '<div class="ai-section-title"><span class="ai-section-emoji">' + emoji + '</span>' + actionBlock.title + '</div>' + itemsHtml;
  } else {
    actionEl.innerHTML = '<div class="ai-section-title"><span class="ai-section-emoji">🛠️</span>关键行动</div><ul class="ai-section-list"><li>明天继续今天的练习，保持一致性。</li></ul>';
  }

  // 渲染额外内容
  const otherBlocks = blocks.filter(b => b !== coreBlock && b !== actionBlock);
  if (otherBlocks.length > 0) {
    const extraHtml = otherBlocks.map(b => {
      const items = b.items.length > 0 ? '<ul class="ai-section-list">' + b.items.map(i => '<li>' + i + '</li>').join('') + '</ul>' : '';
      return '<div class="ai-section-title"><span class="ai-section-emoji">' + (b.emoji || '') + '</span>' + b.title + '</div>' + (b.body ? '<div class="ai-section-highlight">' + b.body + '</div>' : '') + items;
    }).join('');
    extraEl.innerHTML = extraHtml;
    extraEl.style.display = 'block';
  } else {
    extraEl.style.display = 'none';
  }
}

let pendingAfterSuggestion = null;

function closeAISuggestion() {
  const overlay = document.getElementById('aiSuggestionOverlay');
  overlay.classList.remove('show');
  if (pendingAfterSuggestion) {
    const fn = pendingAfterSuggestion;
    pendingAfterSuggestion = null;
    setTimeout(fn, 300);
  }
}

// ===== 全局状态 =====
let currentDay = 1;
let currentType = 'presence';
let practiceAnswers = {};

// 从URL参数获取练习类型和天数
const urlParams = new URLSearchParams(window.location.search);
const typeParam = urlParams.get('type');
const dayParam = urlParams.get('day');
const reviewMode = urlParams.get('review') === '1';

if (typeParam && practiceData[typeParam]) {
  currentType = typeParam;
}

// 如果有day参数，设置当前天数
if (dayParam) {
  const d = parseInt(dayParam);
  if (d >= 1 && d <= 7) {
    currentDay = d;
  }
}

const data = practiceData[currentType];

// ===== 初始化页面 =====
function initPage() {
  document.getElementById('navTitle').textContent = data.title + '专项练习';
  renderDay(currentDay);
}

// ===== 更新底部导航按钮状态 =====
function updateDayNav() {
  document.getElementById('navCurrent').textContent = 'Day ' + currentDay + ' / 7';
  const prevBtn = document.getElementById('prevBtn');
  if (currentDay <= 1) {
    // Day 1: 上一页跳转到测评题目
    prevBtn.disabled = false;
    prevBtn.textContent = '上一页';
    prevBtn.onclick = function() { navigateTo('./' + getQuizPage() + '?review=1&q=7'); };
  } else {
    // Day 2-7: 上一页回到上一天
    prevBtn.disabled = false;
    prevBtn.textContent = '上一页';
    prevBtn.onclick = function() { goPrev(); };
  }
  document.getElementById('nextBtnNav').disabled = currentDay >= 7;
}

// ===== 渲染每一天 =====
function renderDay(dayNum) {
  const dayData = data.days[dayNum - 1];
  const container = document.getElementById('practiceContent');

  document.getElementById('navDay').textContent = 'Day ' + dayNum + ' / 7';
  updateProgress();
  updateDayNav();

  let interactionHTML = '';
  if (dayData.interaction === 'text') {
    interactionHTML = `
      <div class="interaction-area">
        <textarea class="text-input" id="dayInput" placeholder="${dayData.hint}"></textarea>
      </div>
    `;
  } else if (dayData.interaction === 'countdown') {
    interactionHTML = `
      <div class="countdown-display" id="countdown">30:00</div>
      <div class="countdown-hint">${dayData.hint}</div>
      <div class="interaction-area">
        <textarea class="text-input" id="dayInput" placeholder="${dayData.inputLabel}"></textarea>
      </div>
    `;
  }

  container.innerHTML = `
    <div class="practice-container active" id="day${dayNum}">
      <div class="day-badge">Day ${dayNum} / 7</div>
      <div class="day-title">${dayData.title}</div>
      <div class="day-subtitle">${dayData.subtitle}</div>
      <div class="day-task">${dayData.task}</div>
      ${interactionHTML}
      <button class="next-btn" id="nextBtn">${dayNum < 7 ? '完成今日练习' : '完成7天旅程'}</button>
    </div>
  `;

  // 绑定输入事件
  const input = document.getElementById('dayInput');
  const nextBtn = document.getElementById('nextBtn');
  if (input) {
    // 恢复之前保存的答案
    if (practiceAnswers['day' + dayNum]) {
      input.value = practiceAnswers['day' + dayNum];
      nextBtn.classList.add('show');
    }
    input.addEventListener('input', () => {
      if (input.value.trim().length > 0) {
        nextBtn.classList.add('show');
      }
    });
  }

  // 倒计时逻辑
  if (dayData.interaction === 'countdown') {
    startCountdown(30 * 60);
  }

  nextBtn.addEventListener('click', () => {
    practiceAnswers['day' + dayNum] = input ? input.value : '';
    savePracticeProgress();
    const userAnswer = input ? input.value : '';
    if (dayNum < 7) {
      pendingAfterSuggestion = () => nextDay();
    } else {
      pendingAfterSuggestion = () => showBadge();
    }
    showAISuggestion(dayNum, dayData, userAnswer);
  });
}

// ===== 倒计时 =====
function startCountdown(seconds) {
  const display = document.getElementById('countdown');
  let remaining = seconds;
  const timer = setInterval(() => {
    remaining--;
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    display.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    if (remaining <= 0) {
      clearInterval(timer);
      display.textContent = '00:00';
      document.getElementById('nextBtn').classList.add('show');
    }
  }, 1000);
}

// ===== 切换天数（通用） =====
function switchDay(newDay) {
  currentDay = newDay;
  renderDay(currentDay);
}

// ===== 上一天 =====
function goPrev() {
  if (currentDay > 1) {
    switchDay(currentDay - 1);
  }
}

// ===== 下一天 =====
function goNext() {
  if (currentDay < 7) {
    switchDay(currentDay + 1);
  }
}

// ===== 完成今日练习（原来的nextDay） =====
function nextDay() {
  switchDay(currentDay + 1);
}

// ===== 更新进度条 =====
function updateProgress() {
  const percent = (currentDay / 7) * 100;
  document.getElementById('progressFill').style.width = percent + '%';
}

// ===== 显示终极彩蛋徽章 =====
function showBadge() {
  const overlay = document.getElementById('badgeOverlay');
  document.getElementById('badgeTitle').textContent = '【' + data.badge.name + '】';
  document.getElementById('badgeDesc').textContent =
    '7天的旅程结束了，但你的' + data.title + '才刚刚开始生长。\n\n' +
    (currentType === 'presence' ? '世界再喧嚣，你随时可以回到自己的锚点。' :
     currentType === 'boundary' ? '你的边界才刚刚开始生长。' :
     '从今天起，你是自己时间的CEO。');

  // 绘制徽章SVG
  drawBadge(data.badge.color);

  overlay.classList.add('show');
}

// ===== 绘制徽章 =====
function drawBadge(color) {
  const svg = document.getElementById('badgeSvg');
  const shape = currentType === 'presence' ? 'circle'
    : currentType === 'boundary' ? 'hexagon' : 'triangle';

  let shapePath = '';
  if (shape === 'circle') {
    shapePath = '<circle cx="100" cy="100" r="60" fill="none" stroke="' + color + '" stroke-width="3"/>' +
      '<circle cx="100" cy="100" r="45" fill="none" stroke="' + color + '" stroke-width="1.5" opacity="0.5"/>' +
      '<circle cx="100" cy="100" r="30" fill="' + color + '" opacity="0.15"/>' +
      '<circle cx="100" cy="100" r="8" fill="' + color + '"/>';
  } else if (shape === 'hexagon') {
    const pts = '100,40 152.9,70 152.9,130 100,160 47.1,130 47.1,70';
    shapePath = '<polygon points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="3"/>' +
      '<polygon points="' + pts + '" fill="' + color + '" opacity="0.1"/>' +
      '<circle cx="100" cy="100" r="8" fill="' + color + '"/>';
  } else {
    shapePath = '<polygon points="100,35 165,155 35,155" fill="none" stroke="' + color + '" stroke-width="3"/>' +
      '<polygon points="100,55 145,140 55,140" fill="' + color + '" opacity="0.1"/>' +
      '<circle cx="100" cy="115" r="8" fill="' + color + '"/>';
  }

  svg.innerHTML = shapePath;
}

// ===== 保存练习进度 =====
function savePracticeProgress() {
  const saved = localStorage.getItem('subjectivityProgress');
  if (saved) {
    const progress = JSON.parse(saved);
    // 更新到下一题（如果当前不是第7天）
    if (currentDay < 7) {
      progress.practiceDay = currentDay + 1;
    } else {
      progress.practiceDay = 8; // 标记已完成
    }
    progress.lastVisit = new Date().toISOString();
    localStorage.setItem('subjectivityProgress', JSON.stringify(progress));
  }
}

// ===== 返回 =====
function goBack() {
  navigateTo('./' + getQuizPage() + '?review=1&q=7');
}

// ===== 查看测评题目 =====
function goToQuiz() {
  navigateTo('./' + getQuizPage() + '?review=1&q=7');
}

// 启动
initPage();
